name: Build & Pack for Web Store

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Pack
        run: npm run pack

      - name: Upload store-ready artifact
        uses: actions/upload-artifact@v4
        with:
          name: save-link-to-notion-webstore
          path: save-link-to-notion.zip
