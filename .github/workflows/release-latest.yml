name: Build & Pack for Web Store

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump manifest version
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('public/manifest.json', 'utf8'));
            const [major, minor] = manifest.version.split('.');
            manifest.version = major + '.' + minor + '.' + '${{ github.run_number }}';
            fs.writeFileSync('public/manifest.json', JSON.stringify(manifest, null, 4) + '\n');
            console.log('Version bumped to ' + manifest.version);
          "

      - name: Build & Pack
        run: npm run pack

      - name: Upload store-ready artifact
        uses: actions/upload-artifact@v4
        with:
          name: save-link-to-notion-webstore
          path: save-link-to-notion.zip
